<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">

  <!-- ===================== DEFINITIONS ===================== -->
  <defs>
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Flow Animation -->
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7C200" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F7C200" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F7C200" stop-opacity="0"/>
    </linearGradient>

    <style>
      .node {
        fill: #000;
        stroke: #F7C200;
        stroke-width: 2;
        filter: url(#glow);
      }

      .label {
        fill: #F7C200;
        font-family: monospace;
        font-size: 12px;
      }

      .link {
        stroke: #444;
        stroke-width: 2;
        fill: none;
      }

      .flow-line {
        stroke: url(#flow);
        stroke-width: 3;
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: flow 3s linear infinite;
      }

      @keyframes flow {
        to {
          stroke-dashoffset: -120;
        }
      }

      .pulse {
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { r: 6; opacity: 1; }
        50% { r: 10; opacity: 0.6; }
      }
    </style>
  </defs>

  <!-- ===================== LINKS ===================== -->
  <path class="link" d="M150 250 L300 150"/>
  <path class="link" d="M300 150 L500 150"/>
  <path class="link" d="M500 150 L700 250"/>
  <path class="link" d="M300 150 L500 350"/>
  <path class="link" d="M500 350 L700 250"/>

  <!-- Animated Flow -->
  <path class="flow-line" d="M150 250 L300 150"/>
  <path class="flow-line" d="M300 150 L500 150"/>
  <path class="flow-line" d="M500 150 L700 250"/>
  <path class="flow-line" d="M300 150 L500 350"/>
  <path class="flow-line" d="M500 350 L700 250"/>

  <!-- ===================== NODES ===================== -->
  <!-- Client -->
  <circle cx="150" cy="250" r="8" class="node pulse"/>
  <text x="120" y="280" class="label">Client UI</text>

  <!-- Frontend -->
  <circle cx="300" cy="150" r="8" class="node pulse"/>
  <text x="260" y="130" class="label">Frontend</text>

  <!-- Backend -->
  <circle cx="500" cy="150" r="8" class="node pulse"/>
  <text x="460" y="130" class="label">Django Core</text>

  <!-- Database -->
  <circle cx="500" cy="350" r="8" class="node pulse"/>
  <text x="460" y="380" class="label">Database</text>

  <!-- AI Layer -->
  <circle cx="700" cy="250" r="8" class="node pulse"/>
  <text x="660" y="280" class="label">AlphaBot AI</text>

</svg>